<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Valentine's Day!</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/particles.js/2.0.0/particles.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/typed.js@2.0.12"></script>
    <link href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@400;600&display=swap');

        body, html {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            height: 100%;
            overflow-x: hidden;
        }

        #particles-js {
            position: fixed;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #ffe6e6, #ffb3b3, #ff9999);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }

        .content {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            text-align: center;
            color: #d4145a;
            padding: 20px;
            box-sizing: border-box;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }

        p {
            font-size: 1.2rem;
            margin-bottom: 1.5rem;
        }

        .heart-container {
            margin-top: 2rem;
        }

        .heart {
            background-color: #d4145a;
            display: inline-block;
            height: 100px;
            margin: 0 10px;
            position: relative;
            top: 0;
            transform: rotate(-45deg);
            width: 100px;
            animation: pulse 1s ease infinite;
            box-shadow: 0 0 40px #d4145a;
        }

        .heart:before,
        .heart:after {
            content: "";
            background-color: #d4145a;
            border-radius: 50%;
            height: 100px;
            position: absolute;
            width: 100px;
            box-shadow: 0 0 40px #d4145a;
        }

        .heart:before {
            top: -50px;
            left: 0;
        }

        .heart:after {
            left: 50px;
            top: 0;
        }

        @keyframes pulse {
            0% { transform: rotate(-45deg) scale(1); }
            50% { transform: rotate(-45deg) scale(1.1); }
            100% { transform: rotate(-45deg) scale(1); }
        }

        .message {
            max-width: 90%;
            background-color: rgba(255, 255, 255, 0.8);
            padding: 1.5rem;
            border-radius: 15px;
            margin: 1rem 0;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .message p {
            font-size: 1rem;
            line-height: 1.6;
            color: #333;
            margin: 0;
        }

        button {
            background-color: #d4145a;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1.1rem;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 1rem;
            box-shadow: 0 5px 15px rgba(212, 20, 90, 0.4);
        }

        button:hover {
            background-color: #ff1e6d;
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(255, 30, 109, 0.6);
        }

        button:active {
            transform: translateY(-1px);
            box-shadow: 0 4px 10px rgba(255, 30, 109, 0.4);
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2rem;
            }

            p {
                font-size: 1rem;
            }

            .heart {
                height: 80px;
                width: 80px;
            }

            .heart:before,
            .heart:after {
                height: 80px;
                width: 80px;
            }

            .heart:before {
                top: -40px;
            }

            .heart:after {
                left: 40px;
            }

            .message {
                padding: 1rem;
            }

            .message p {
                font-size: 0.9rem;
            }

            button {
                padding: 10px 20px;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div id="particles-js"></div>
    <div class="content">
        <header>
            <h1 data-aos="fade-down" data-aos-duration="1000">Happy Valentine's Day!</h1>
            <p data-aos="fade-up" data-aos-duration="1000" data-aos-delay="300">To my amazing girlfriend</p>
        </header>

        <main>
            <div class="heart-container" data-aos="zoom-in" data-aos-duration="1000" data-aos-delay="600">
                <div class="heart"></div>
            </div>
            <div id="message" class="message" data-aos="fade-up" data-aos-duration="1000" data-aos-delay="900">
                <p id="typed-text"></p>
            </div>
        </main>

        <footer>
            <button onclick="showSurprise()" data-aos="fade-up" data-aos-duration="1000" data-aos-delay="1200">Click for a surprise!</button>
        </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            AOS.init({
                disable: 'mobile' // Disable AOS on mobile devices
            });

            particlesJS('particles-js', {
                particles: {
                    number: { value: 80, density: { enable: true, value_area: 800 } },
                    color: { value: "#ffffff" },
                    shape: { type: "circle" },
                    opacity: { value: 0.5, random: false },
                    size: { value: 3, random: true },
                    line_linked: { enable: true, distance: 150, color: "#ffffff", opacity: 0.4, width: 1 },
                    move: { enable: true, speed: 6, direction: "none", random: false, straight: false, out_mode: "out", bounce: false }
                },
                interactivity: {
                    detect_on: "canvas",
                    events: { onhover: { enable: true, mode: "repulse" }, onclick: { enable: true, mode: "push" }, resize: true },
                    modes: { repulse: { distance: 100, duration: 0.4 }, push: { particles_nb: 4 } }
                },
                retina_detect: true
            });

            new Typed('#typed-text', {
                strings: ["My dearest, your love fills my heart with joy every day. You're the most beautiful and amazing person I know. Thank you for being you. I love you more than words can express!"],
                typeSpeed: 40,
                showCursor: false
            });
        });

        function showSurprise() {
            Swal.fire({
                title: 'I love you to the moon and back!',
                text: 'You mean everything to me, my love.',
                imageUrl: 'https://media.giphy.com/media/26BRv0ThflsHCqDrG/giphy.gif',
                imageWidth: 200,
                imageHeight: 200,
                imageAlt: 'Animated heart',
                confirmButtonText: 'I love you too!',
                background: '#fff0f5',
                confirmButtonColor: '#d4145a',
                showConfirmButton: true,
                customClass: {
                    title: 'swal-title',
                    content: 'swal-text'
                }
            }).then((result) => {
                if (result.isConfirmed) {
                    confetti({
                        particleCount: 100,
                        spread: 70,
                        origin: { y: 0.6 }
                    });
                }
            });
        }
    </script>
</body>
</html>
