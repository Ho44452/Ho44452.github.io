<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Valentine Message</title>
    <script src="https://cdn.jsdelivr.net/npm/typed.js@2.0.12"></script>
    <script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@400;600&family=Sarabun:wght@400;700&display=swap');

        body, html {
            font-family: 'Poppins', 'Sarabun', sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, #ffe6e6, #ffb3b3, #ff9999);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            max-width: 800px;
            width: 100%;
            padding: 20px;
            box-sizing: border-box;
        }

        .typing-container {
            text-align: center;
            margin: 2rem 0;
            min-height: 200px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        #typed-strings {
            display: none;
        }

        .typed-text {
            font-family: 'Dancing Script', cursive;
            font-size: 2.5rem;
            color: #d4145a;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
            line-height: 1.4;
        }

        .spotify-container {
            position: relative;
            width: 100%;
            padding-bottom: 152px;
            margin-top: 2rem;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .spotify-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .note {
            font-size: 0.9rem;
            color: #666;
            text-align: center;
            margin-top: 1rem;
        }

        .next-button {
            display: inline-block;
            background-color: #d4145a;
            color: white;
            padding: 15px 30px;
            border-radius: 50px;
            text-decoration: none;
            font-size: 1.1rem;
            margin-top: 2rem;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(212, 20, 90, 0.4);
        }

        .next-button:hover {
            background-color: #ff1e6d;
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(255, 30, 109, 0.6);
        }

        @media (max-width: 768px) {
            .container {
                padding: 15px;
            }

            .typed-text {
                font-size: 1.8rem;
            }

            .typing-container {
                min-height: 150px;
            }

            .next-button {
                padding: 12px 24px;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="typing-container" data-aos="fade-down">
            <div id="typed-strings">
                <p>My dearest girlfriend... ❤️</p>
                <p>You make my heart skip a beat every time I see you... 💕</p>
                <p>Your smile brightens up my darkest days... ✨</p>
                <p>You are my everything, my Valentine... 🌹</p>
                <p>I love you more than words can express... 💝</p>
            </div>
            <span id="typed" class="typed-text"></span>
        </div>

        <div class="spotify-container" data-aos="fade-up">
            <iframe
                src="https://open.spotify.com/embed/track/0V3sKBY7Iypaufb6RzR3Er?utm_source=generator&theme=0&autoplay=1"
                frameBorder="0"
                allowfullscreen=""
                allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
                loading="lazy">
            </iframe>
        </div>
        <p class="note">ถ้าเพลงไม่เล่นอย่าลืมกดเล่นนะจ๊ะ</p>
        
        <div style="text-align: center;">
            <a href="rose-page.html" class="next-button" data-aos="fade-up">
                Continue to Rose Garden 🌹
            </a>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            AOS.init({
                duration: 1000,
                once: true,
                disable: 'mobile'
            });

            new Typed('#typed', {
                stringsElement: '#typed-strings',
                typeSpeed: 50,
                backSpeed: 30,
                backDelay: 2000,
                startDelay: 1000,
                loop: true,
                showCursor: true,
                cursorChar: '|',
                autoInsertCss: true,
            });
        });
    </script>
</body>
</html>
