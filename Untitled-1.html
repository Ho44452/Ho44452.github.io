<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Valentine's Day!</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(to bottom, #ffe6e6, #ffb3b3);
            min-height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: #d4145a;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }
        p {
            font-size: 1.2rem;
            margin-bottom: 2rem;
        }
        .heart {
            background-color: #d4145a;
            display: inline-block;
            height: 150px;
            margin: 0 10px;
            position: relative;
            top: 0;
            transform: rotate(-45deg);
            width: 150px;
            animation: pulse 1s ease infinite;
        }
        .heart:before,
        .heart:after {
            content: "";
            background-color: #d4145a;
            border-radius: 50%;
            height: 150px;
            position: absolute;
            width: 150px;
        }
        .heart:before {
            top: -75px;
            left: 0;
        }
        .heart:after {
            left: 75px;
            top: 0;
        }
        @keyframes pulse {
            0% { transform: rotate(-45deg) scale(1); }
            50% { transform: rotate(-45deg) scale(1.1); }
            100% { transform: rotate(-45deg) scale(1); }
        }
        .message {
            max-width: 600px;
            background-color: rgba(255, 255, 255, 0.8);
            padding: 1rem;
            border-radius: 10px;
            margin-top: 2rem;
            opacity: 0;
            transition: opacity 1s ease-in-out;
        }
        button {
            background-color: #d4145a;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 1rem;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s ease;
            margin-top: 2rem;
        }
        button:hover {
            background-color: #ff1e6d;
        }
    </style>
</head>
<body>
    <header>
        <h1>Happy Valentine's Day!</h1>
        <p>To my amazing girlfriend</p>
    </header>

    <main>
        <div class="heart"></div>
        <div id="message" class="message">
            <p>My dearest, your love fills my heart with joy every day. You're the most beautiful and amazing person I know. Thank you for being you. I love you more than words can express!</p>
        </div>
    </main>

    <footer>
        <button onclick="showSurprise()">Click for a surprise!</button>
    </footer>

    <script>
        window.onload = function() {
            setTimeout(function() {
                document.getElementById('message').style.opacity = '1';
            }, 2000);
        }

        function showSurprise() {
            Swal.fire({
                title: 'I love you to the moon and back!',
                text: 'You mean everything to me, my love.',
                imageUrl: 'https://media.giphy.com/media/26BRv0ThflsHCqDrG/giphy.gif',
                imageWidth: 200,
                imageHeight: 200,
                imageAlt: 'Animated heart',
                confirmButtonText: 'I love you too!',
                background: '#fff0f5',
                confirmButtonColor: '#d4145a',
                showConfirmButton: true,
                customClass: {
                    title: 'swal-title',
                    content: 'swal-text'
                }
            }).then((result) => {
                if (result.isConfirmed) {
                    confetti({
                        particleCount: 100,
                        spread: 70,
                        origin: { y: 0.6 }
                    });
                }
            });
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
</body>
</html>
